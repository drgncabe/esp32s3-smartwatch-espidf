[env:esp-smartwatch]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; Board configuration
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = partitions/partitions.csv

; Use custom sdkconfig for NAT support
board_build.esp-idf.sdkconfig_path = sdkconfig.defaults

; Extra CMake arguments to ensure BT component is included
board_build.cmake_extra_args =
    -DIDF_SDKCONFIG_DEFAULTS=sdkconfig.defaults

; Upload configuration
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build optimization - use all CPU cores for faster compilation
build_jobs = auto
    
; Library dependencies
lib_deps = 
    lvgl/lvgl@^8.3.0
    lewisxhe/SensorLib

; LVGL configuration - tell compiler where to find lv_conf.h
build_flags = 
    -DBOARD_HAS_PSRAM
    -I.
    -DLV_CONF_INCLUDE_SIMPLE
    -DCONFIG_ESPTOOLPY_FLASHSIZE_16MB=1
    ; Allow overriding WiFi stack functions for raw frame transmission
    -Wl,--allow-multiple-definition
    ; ========================================================================
    ; NAT/IP Forwarding Configuration for Hotspot Internet Sharing
    ; ========================================================================
    ; These flags enable the ESP32 to act as a NAT router, allowing devices
    ; connected to the hotspot to access the internet through the ESP32's
    ; WiFi connection.
    ;
    ; CONFIG_LWIP_IP_FORWARD: Enables IP packet forwarding between interfaces
    ; CONFIG_LWIP_IPV4_NAPT: Enables Network Address and Port Translation
    ; IP_FORWARD_ALLOW_TX_ON_RX_NETIF: Allows forwarding packets back out
    ;   the same interface they came in on (required for AP+STA mode)
    ; ========================================================================
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_IPV4_NAPT=1
    -DIP_FORWARD_ALLOW_TX_ON_RX_NETIF=1