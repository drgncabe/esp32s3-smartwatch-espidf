[env:esp-smartwatch]
platform = espressif32@6.9.0
platform_packages =
    platformio/tool-cmake@~3.30.0
board = waveshare_esp32_s3_lcd_1_69
framework = espidf

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions/partitions.csv

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    lvgl/lvgl@8.4.0

build_flags =
    -DBOARD_TYPE=1
    -DBOARD_HAS_PSRAM
    -I.
    -DLV_CONF_INCLUDE_SIMPLE
    -DCONFIG_ESPTOOLPY_FLASHSIZE_16MB=1
    -DCONFIG_ESPTOOLPY_FLASHSIZE="16MB"
    -DCONFIG_ESPTOOLPY_FLASHMODE_DIO=1
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_IPV4_NAPT=1
    -DIP_FORWARD_ALLOW_TX_ON_RX_NETIF=1
